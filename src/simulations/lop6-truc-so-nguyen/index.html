<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trực quan trục số nguyên động - Toán 6</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .math-canvas {
      background: #111827;
      border: 2px dashed rgba(255, 255, 255, 0.1);
      border-radius: 0.5rem;
      box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6);
      max-width: 100%;
      height: auto;
    }
    
    .btn-action {
      background: var(--color-primary);
      color: white;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 0.375rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition-fast);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: center;
    }
    
    .btn-action:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
    }
    
    .btn-action:disabled {
      background: var(--text-muted);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
    
    .radio-group {
      display: flex;
      gap: 1rem;
      background: rgba(255, 255, 255, 0.03);
      padding: 0.5rem;
      border-radius: 0.5rem;
      border: 1px solid var(--border-color);
    }
    
    .radio-label {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      cursor: pointer;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
   

    <div class="simulation-container">
      <!-- Bảng vẽ mô phỏng -->
      <div class="canvas-panel">
        <canvas id="numberLineCanvas" width="550" height="350" class="math-canvas"></canvas>
      </div>

      <!-- Bảng điều khiển -->
      <div class="control-panel">
        <h3 style="font-size: 1.2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">Phép tính & Điều khiển</h3>
        
        <div class="control-group">
          <label class="control-label">Chọn phép tính</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="operator" value="add" checked> Cộng (+)
            </label>
            <label class="radio-label">
              <input type="radio" name="operator" value="sub"> Trừ (-)
            </label>
          </div>
        </div>

        <div class="control-group">
          <div class="control-label">
            <span>Số thứ nhất (X)</span>
            <span id="valX" style="font-weight: bold; color: var(--color-primary);">0</span>
          </div>
          <input type="range" id="sliderX" min="-8" max="8" value="0">
        </div>

        <div class="control-group">
          <div class="control-label">
            <span>Số thứ hai (Y)</span>
            <span id="valY" style="font-weight: bold; color: var(--color-accent);">0</span>
          </div>
          <input type="range" id="sliderY" min="-8" max="8" value="3">
        </div>

        <div class="control-group">
          <label class="control-label">Phép toán thực hiện</label>
          <div class="math-display">
            <span id="calcExpression" class="formula-highlight">0 + 3 = 3</span>
          </div>
        </div>

        <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
          <button id="btnPlay" class="btn-action" style="flex: 1;">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            Chạy mô phỏng
          </button>
          <button id="btnReset" class="btn-action" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: var(--text-primary);">
            Đặt lại
          </button>
        </div>
      </div>
    </div>
  </main>


  <script src="sim.js"></script>
</body>
</html>
