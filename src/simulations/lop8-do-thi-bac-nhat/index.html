<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đồ thị hàm số y = ax + b - Toán 8 & 9</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .math-canvas {
      background: #111827;
      border: 2px dashed rgba(255, 255, 255, 0.1);
      border-radius: 0.5rem;
      box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6);
      max-width: 100%;
      height: auto;
    }
    
    .status-panel {
      padding: 1rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 0.5rem;
      font-size: 0.85rem;
    }
    
    .status-panel p {
      margin-bottom: 0.5rem;
      display: flex;
      justify-content: space-between;
    }
    
    .status-panel p:last-child {
      margin-bottom: 0;
    }
    
    .value-highlight {
      font-weight: bold;
    }
    
    .badge-var {
      background: rgba(255, 255, 255, 0.1);
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      font-family: monospace;
    }
  </style>
</head>
<body>


  <main>
   

    <div class="simulation-container">
      <!-- Bảng vẽ mô phỏng -->
      <div class="canvas-panel">
        <canvas id="graphCanvas" width="420" height="420" class="math-canvas"></canvas>
      </div>

      <!-- Bảng điều khiển -->
      <div class="control-panel">
        <h3 style="font-size: 1.2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">Thông số & Điều khiển</h3>
        
        <div class="control-group">
          <div class="control-label">
            <span>Hệ số góc a (Độ dốc)</span>
            <span id="valA" style="font-weight: bold; color: var(--color-primary);">1</span>
          </div>
          <input type="range" id="sliderA" min="-5" max="5" step="0.1" value="1">
        </div>

        <div class="control-group">
          <div class="control-label">
            <span>Hệ số tự do b (Giao điểm Oy)</span>
            <span id="valB" style="font-weight: bold; color: var(--color-accent);">0</span>
          </div>
          <input type="range" id="sliderB" min="-10" max="10" step="0.5" value="2">
        </div>

        <div class="control-group">
          <label class="control-label">Phương trình hiện tại</label>
          <div class="math-display">
            \(y = \) <span id="formulaText" class="formula-highlight">1x + 2</span>
          </div>
        </div>

        <div class="control-group">
          <label class="control-label">Tính chất của hàm số</label>
          <div class="status-panel">
            <p>
              <span>Chiều biến thiên:</span>
              <span id="propDirection" class="value-highlight">Đồng biến (a > 0)</span>
            </p>
            <p>
              <span>Độ dốc đường thẳng:</span>
              <span id="propSlope" class="value-highlight">Đi lên từ trái sang phải</span>
            </p>
            <p>
              <span>Giao điểm trục tung Oy:</span>
              <span id="propOy" class="value-highlight" style="color: var(--color-accent);">P(0, 2)</span>
            </p>
            <p>
              <span>Giao điểm trục hoành Ox:</span>
              <span id="propOx" class="value-highlight" style="color: var(--color-success);">Q(-2, 0)</span>
            </p>
          </div>
        </div>
      </div>
    </div>
  </main>



  <script src="sim.js"></script>
</body>
</html>
