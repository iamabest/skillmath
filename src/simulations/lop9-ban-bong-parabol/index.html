<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khảo sát Parabol y = ax² - Toán 9</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .math-canvas {
      background: #111827;
      border: 2px dashed rgba(255, 255, 255, 0.1);
      border-radius: 0.5rem;
      box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6);
      max-width: 100%;
      height: auto;
    }
    
    .btn-action {
      background: var(--color-primary);
      color: white;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 0.375rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition-fast);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: center;
    }
    
    .btn-action:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
    }
    
    .btn-action:disabled {
      background: var(--text-muted);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
  </style>
</head>
<body>


  <main>
   

    <div class="simulation-container">
      <!-- Bảng vẽ đồ thị -->
      <div class="canvas-panel">
        <canvas id="parabolaCanvas" width="450" height="420" class="math-canvas"></canvas>
      </div>

      <!-- Bảng điều khiển -->
      <div class="control-panel">
        <h3 style="font-size: 1.2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">Hệ số & Chuyển động</h3>
        
        <div class="control-group">
          <div class="control-label">
            <span>Hệ số a</span>
            <span id="valA" style="font-weight: bold; color: var(--color-primary);">0.5</span>
          </div>
          <input type="range" id="sliderA" min="-1.5" max="1.5" step="0.05" value="0.5">
        </div>

        <div class="control-group">
          <label class="control-label">Phương trình Parabol</label>
          <div class="math-display">
            \(y = \) <span id="formulaText" class="formula-highlight">0.5x²</span>
          </div>
        </div>

        <div class="control-group">
          <label class="control-label">Tọa độ bóng trượt động</label>
          <div class="math-display" style="font-size: 1.1rem; background: rgba(0, 0, 0, 0.3); border-color: rgba(255, 255, 255, 0.05);">
            \(M(x; y) = \) <span id="pointCoordinates" style="color: var(--color-success); font-weight: bold;">(2.00; 2.00)</span>
          </div>
        </div>

        <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
          <button id="btnRoll" class="btn-action" style="flex: 1;">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
            Thả bóng trượt
          </button>
        </div>

        <div class="control-group">
          <label class="control-label">Nhận xét sư phạm</label>
          <div id="parabolaNotice" class="info-box" style="font-size: 0.85rem;">
            <!-- Cập nhật bằng JS -->
          </div>
        </div>
      </div>
    </div>
  </main>


  <script src="sim.js"></script>
</body>
</html>
